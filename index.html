/* ════════════════════════════════════════
   COLOR MATH
   ────────────────────────────────────────
   핵심: G 채널 자기 정규화 + Rn-Bn → Agtron

   STEP 1. 원두 픽셀 수집 (R ≥ B×1.03, 밝기 8~205)
   STEP 2. 10~90% lum trim (그림자·반사광 제거)
   STEP 3. G 중앙값으로 정규화: scale = 128 / G_mid
   STEP 4. Rn = R×scale, Bn = B×scale
   STEP 5. Agtron = -1.075 × (Rn-Bn) + 132.9
   STEP 6. L* = (Agtron - 8) / 1.05 (화면 표시용)

   캘리브레이션 (G=128 기준):
     Ag=95 → Rn-Bn≈36  (Very Light)
     Ag=77 → Rn-Bn≈54  (Medium-Light)
     Ag=65 → Rn-Bn≈63  (Medium)
     Ag=40 → Rn-Bn≈86  (Dark)
     Ag=28 → Rn-Bn≈99  (Very Dark)
   ────────────────────────────────────────
   이 공식이 거리·AWB 불변인 이유:
   카메라 픽셀 = 표면색 × AWB × 조도(I)
   Rn-Bn = (R-B)×scale = (R-B)×(128/G)
         = (R_true-B_true)×(AWB_r-AWB_b)/AWB_g × 128/G_true
   I 완전 약분 → 거리 무관 ✓
   AWB_r/AWB_g ≈ 상수 (토치 환경) ✓
════════════════════════════════════════ */

function lum(r,g,b){return 0.2126*r+0.7152*g+0.0722*b;}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function rgbStr(c){return'rgb('+Math.round(c.r)+','+Math.round(c.g)+','+Math.round(c.b)+')';}
function rgbTxt(c){return'RGB '+Math.round(c.r)+' '+Math.round(c.g)+' '+Math.round(c.b);}
function toLinear(c){return c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);}
function sRGBtoLab(r8,g8,b8){
  var rl=toLinear(r8/255),gl=toLinear(g8/255),bl=toLinear(b8/255);
  var X=rl*0.4124564+gl*0.3575761+bl*0.1804375;
  var Y=rl*0.2126729+gl*0.7151522+bl*0.0721750;
  var Z=rl*0.0193339+gl*0.1191920+bl*0.9503041;
  function f(t){return t>0.008856?Math.cbrt(t):7.787*t+16/116;}
  return{L:116*f(Y)-16, a:500*(f(X/0.95047)-f(Y)), b:200*(f(Y)-f(Z/1.08883))};
}

/* ── 픽셀 분류 ──────────────────────────────────────────────
   원두(모든 로스트): 따뜻한 색 (R ≥ B×1.03), lum 8~205
   흰 배경/컵내벽:   lum>205 or (R>200 & G>190 & B>175)
   그림자:           lum<8
   ─────────────────────────────────────────────────────────── */
function classifyPixel(p){
  var lm=p.lum;
  if(lm>205) return 'white';
  if(p.r>200&&p.g>190&&p.b>175) return 'white';
  if(lm<8)   return 'ignore';
  if(p.r>=p.b*1.03&&p.g>=8&&lm<200) return 'bean';
  return 'ignore';
}
function isBeanPixel(p,mode){
  if(p.lum>210||p.lum<6) return false;
  if(mode==='lum')     return p.lum>10&&p.lum<200;
  if(mode==='relaxed') return p.r>=p.b&&p.lum>8&&p.lum<200;
  return p.r>=p.b*1.02&&p.lum>10&&p.lum<198;
}

/* ── G 자기정규화 + Rn-Bn Agtron ─────────────────────────── */
function gNormAgtron(beanPx){
  if(!beanPx||beanPx.length<5) return null;
  var clean=beanPx.filter(function(p){return p.lum>8&&p.lum<205;});
  if(clean.length<3) clean=beanPx.slice();
  clean.sort(function(a,b){return a.lum-b.lum;});
  var n=clean.length;
  var trimmed=clean.slice(Math.floor(n*0.10),Math.floor(n*0.90));
  if(trimmed.length<3) trimmed=clean;

  var gArr=trimmed.map(function(p){return p.g;}).sort(function(a,b){return a-b;});
  var gMid=gArr[Math.floor(gArr.length/2)];
  if(gMid<5) return null;
  var scale=128/gMid;

  /* Rn-Bn 분포 → 중앙값 */
  var rnbn=trimmed.map(function(p){
    return Math.min(p.r*scale,255)-Math.min(p.b*scale,255);
  }).sort(function(a,b){return a-b;});
  var rnbnMed=rnbn[Math.floor(rnbn.length/2)];

  /* ★ 올바른 Agtron 공식 */
  var agtron=clamp(Math.round(-1.075*rnbnMed+132.9),15,95);

  /* L* 는 Agtron 에서 역산 (거리불변) */
  var Ls=clamp((agtron-8)/1.05,5,90);

  /* CIELAB a*, b* 는 정규화 RGB 에서 */
  var rS=0,gS=0,bS=0;
  trimmed.forEach(function(p){ rS+=Math.min(p.r*scale,255); gS+=Math.min(p.g*scale,255); bS+=Math.min(p.b*scale,255); });
  var nn=trimmed.length;
  var avgR=rS/nn, avgG=gS/nn, avgB=bS/nn;
  var lab=sRGBtoLab(avgR,avgG,avgB);

  /* sigma: Rn-Bn 분포 → L* 단위 변환 */
  var mean=rnbn.reduce(function(s,v){return s+v;},0)/rnbn.length;
  var variance=rnbn.reduce(function(s,v){return s+Math.pow(v-mean,2);},0)/rnbn.length;
  var sigmaL=Math.sqrt(variance)*1.075/1.05;

  return{Ls:Ls, agtron:agtron, rnbn:rnbnMed, As:lab.a, Bs:lab.b, sigma:sigmaL,
         bR:Math.round(avgR), bG:Math.round(avgG), bB:Math.round(avgB), gMid:gMid, scale:scale, pixelCount:trimmed.length};
}

function agtronRangeFromL(L){
  var mid=clamp(Math.round(1.05*L+8),15,95);
  return{lo:Math.max(15,mid-5), hi:Math.min(95,mid+5), mid:mid};
}
function roastName(L){
  var ag=clamp(Math.round(1.05*L+8),15,95);
  if(ag>=82) return'Light Roast';
  if(ag>=67) return'Medium-Light Roast';
  if(ag>=52) return'Medium Roast';
  if(ag>=37) return'Medium-Dark Roast';
  return          'Dark Roast';
}

/* ── Frame Analysis ── */
function analyzeFrame(context,W,H){
  try{
    var step=Math.max(3,Math.floor(Math.min(W,H)/100));
    var cx=W/2, cy=H*ROI_CY;
    var r=Math.min(W,H)*FIXED_ROI, r2=r*r;
    var bx0=Math.max(0,Math.round(cx-r-4)), by0=Math.max(0,Math.round(cy-r-4));
    var bx1=Math.min(W,Math.round(cx+r+4)), by1=Math.min(H,Math.round(cy+r+4));
    var allPx=[],beanPx=[],whitePx=[];
    for(var y=by0;y<by1;y+=step) for(var x=bx0;x<bx1;x+=step){
      var dx=x-cx,dy=y-cy;
      if(dx*dx+dy*dy>r2) continue;
      var d=context.getImageData(x,y,1,1).data;
      var px={r:d[0],g:d[1],b:d[2],lum:lum(d[0],d[1],d[2])};
      allPx.push(px);
      var cls=classifyPixel(px);
      if(cls==='bean')  beanPx.push(px);
      if(cls==='white') whitePx.push(px);
    }
    if(allPx.length<20) return null;
    if(beanPx.length<15) beanPx=allPx.filter(function(p){return isBeanPixel(p,'relaxed');});
    if(beanPx.length<8)  beanPx=allPx.filter(function(p){return isBeanPixel(p,'lum');});
    if(beanPx.length<5)  return null;

    var result=gNormAgtron(beanPx);
    if(!result) return null;

    var beanCov=clamp(beanPx.length/Math.max(allPx.length,1),0,1);
    var whiteFrac=whitePx.length/Math.max(allPx.length,1);
    lastCovPct=Math.round(beanCov*100);
    beanPx.sort(function(a,b){return a.lum-b.lum;});
    var hiPx=beanPx.slice(Math.floor(beanPx.length*0.9));
    var hiLum=hiPx.reduce(function(s,p){return s+p.lum;},0)/Math.max(hiPx.length,1);
    var lowLight=hiLum<25;
    var grindResult=(currentMode==='grind')?estimateGrindMicrons(context,W,H):null;
    return{
      Ls:result.Ls, As:result.As, Bs:result.Bs, agtron:result.agtron, sigma:result.sigma,
      beanCoverage:beanCov, whiteFraction:whiteFrac, beanPurity:beanPx.length/Math.max(allPx.length,1),
      lowLight:lowLight, wallL:hiLum,
      bRGB:{r:result.bR,g:result.bG,b:result.bB}, wRGB:{r:result.bR,g:result.bG,b:result.bB},
      whiteRefMode:'gnorm', gScale:result.scale, beanType:'ground',
      grindMicron:grindResult?grindResult.microns:null, grindBlobCount:grindResult?(grindResult.blobCount||0):0,
    };
  }catch(e){return null;}
}

/* ════════════════════════════════════════
   LIVE VIDEO ENGINE
════════════════════════════════════════ */
function startLive(mode){
  if(liveRunning) stopLive();
  currentMode=mode||currentMode;
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    showToast('카메라 API 없음 — HTTPS 환경 필요'); setInst('HTTPS 환경에서 실행해주세요.'); return;
  }
  G('guideBody').classList.remove('open');
  dom.upzone.scrollIntoView({behavior:'smooth',block:'start'});
  dom.it.textContent='카메라 권한 요청 중...';
  pendingResult=null; pendingGrind=null;
  dom.rp.classList.remove('on'); dom.decision.classList.remove('on'); hideValBlock();

  var steps=[
    {video:{facingMode:{exact:'environment'},width:{ideal:1280},height:{ideal:960}}},
    {video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:960}}},
    {video:{facingMode:{ideal:'environment'}}},{video:true}
  ];
  function tryCamera(idx){
    if(idx>=steps.length){ showToast('카메라를 열 수 없습니다.'); setInst('카메라 오류'); return; }
    navigator.mediaDevices.getUserMedia(steps[idx]).then(function(stream){
      liveStream=stream; liveTrack=stream.getVideoTracks()[0];
      dom.liveVideo.srcObject=stream; dom.liveVideo.style.display='block';
      dom.guideOverlay.style.display='block'; dom.upph.style.display='none';
      dom.prev.style.display='none'; dom.upzone.classList.add('loaded');
      dom.stopBtns.style.display='flex'; dom.liveBadge.style.display='block';
      dom.liveReadout.classList.add('on');
      frameBuffer=[]; lastFrameL=null; emaL=null; stableRun=0; lastCovPct=0; covStableRun=0;
      liveRunning=true;
      dom.liveVideo.addEventListener('loadedmetadata',function(){
        enableTorch(); rafId=requestAnimationFrame(frameLoop);
        setInst(currentMode==='color'?'원두를 컵/접시에 담고 가이드 원에 가득 채우세요 (3~8cm)':'A4 흰 종이 위에 원두를 얇게 뿌리고 수직 촬영 (7~9cm)');
      },{once:true});
      var bmi=G('beanModeIndicator');
      if(bmi){ bmi.textContent=currentMode==='color'?'그라운드 컬러 측정':'분쇄도 입자 측정'; bmi.className='bean-mode-indicator on ground'; }
    }).catch(function(err){
      if(err.name==='NotAllowedError'||err.name==='PermissionDeniedError'){
        showToast('카메라 권한 거부 — 주소창 🔒 → 카메라 허용 → 새로고침'); setInst('카메라 권한 허용 후 재시도');
      } else if(err.name==='NotReadableError'||err.name==='TrackStartError'){
        showToast('카메라 다른 앱 사용 중 — 종료 후 재시도'); setInst('카메라 점유 중 — 다른 앱 종료 후 재시도');
      } else { tryCamera(idx+1); }
    });
  }
  tryCamera(0);
}

function enableTorch(){
  if(!liveTrack) return;
  var caps=liveTrack.getCapabilities?liveTrack.getCapabilities():{};
  if(caps.torch) liveTrack.applyConstraints({advanced:[{torch:true}]}).then(function(){dom.torchWarn.style.display='none';}).catch(function(){dom.torchWarn.style.display='block';});
  else dom.torchWarn.style.display='block';
}

function _killCamera(){
  if(rafId){cancelAnimationFrame(rafId);rafId=null;}
  if(liveTrack){try{liveTrack.applyConstraints({advanced:[{torch:false}]});}catch(e){} liveTrack.stop();liveTrack=null;}
  if(liveStream){liveStream.getTracks().forEach(function(t){t.stop();});liveStream=null;}
  dom.liveVideo.srcObject=null; dom.liveVideo.style.display='none';
  dom.guideOverlay.style.display='none'; dom.liveReadout.classList.remove('on');
  dom.torchWarn.style.display='none'; dom.shakeWarn.classList.remove('on');
  dom.liveBadge.style.display='none'; dom.stopBtns.style.display='none';
  dom.upph.style.display='flex';
}
function stopLiveAfterLock(){ liveRunning=false; _killCamera(); }
function stopLive(){
  liveRunning=false; _killCamera();
  if(shakeTimeout){clearTimeout(shakeTimeout);shakeTimeout=null;}
  frameBuffer=[]; lastFrameL=null; emaL=null; stableRun=0; lastCovPct=0; covStableRun=0;
  dom.lrStatus.style.color=''; dom.upzone.classList.remove('loaded');
  dom.badge.style.display='none'; dom.stabBadge.style.display='none'; dom.lowlightWarn.style.display='none';
  var bmi=G('beanModeIndicator'); if(bmi) bmi.classList.remove('on');
  setInst('측정이 중단됐습니다.'); renderStepNav();
}

function frameLoop(ts){
  if(!liveRunning) return;
  rafId=requestAnimationFrame(frameLoop);
  if(ts-lastFrameTime<FRAME_INTERVAL) return;
  lastFrameTime=ts;
  drawGuideOverlay();
  var v=dom.liveVideo;
  if(v.readyState<2) return;
  var W=v.videoWidth,H=v.videoHeight;
  if(!W||!H) return;
  G('liveCvs').width=W; G('liveCvs').height=H; lvx.drawImage(v,0,0,W,H);
  var r=analyzeFrame(lvx,W,H);
  if(!r) return;

  /* 손떨림 감지 */
  var isShake=lastFrameL!==null&&Math.abs(r.Ls-lastFrameL)>SHAKE_DELTA;
  if(isShake){
    frameBuffer=[]; stableRun=0; emaL=null; covStableRun=0;
    dom.shakeWarn.classList.add('on');
    if(shakeTimeout) clearTimeout(shakeTimeout);
    shakeTimeout=setTimeout(function(){dom.shakeWarn.classList.remove('on');},700);
  }
  lastFrameL=r.Ls;
  emaL=emaL===null?r.Ls:EMA_ALPHA*r.Ls+(1-EMA_ALPHA)*emaL;

  /* Coverage 게이트 */
  var cov=r.beanCoverage*100;
  var covOk=cov>=COV_MIN&&cov<=COV_MAX;
  if(covOk) covStableRun++; else{covStableRun=0;frameBuffer=[];stableRun=0;}
  var covGateOk=covStableRun>=COV_STABLE_NEEDED;

  if(!isShake&&!r.lowLight&&covOk){
    stableRun++; frameBuffer.push(r);
    if(frameBuffer.length>FRAME_BUF_SIZE+4) frameBuffer.shift();
  } else if(r.lowLight||!covOk){
    frameBuffer=[]; stableRun=0;
  }

  updateLiveReadout(r,emaL,isShake);

  /* 잠금 조건 */
  if(covGateOk&&!isShake&&!r.lowLight&&frameBuffer.length>=FRAME_BUF_SIZE&&stableRun>=MIN_STABLE_RUN){
    var sigma=computeBufSigma();
    if(sigma<STABLE_SIGMA) autoLock();
  }
}

function computeBufSigma(){
  if(frameBuffer.length<2) return 99;
  var vals=frameBuffer.map(function(r){return r.Ls;});
  var mean=vals.reduce(function(a,b){return a+b;},0)/vals.length;
  return Math.sqrt(vals.reduce(function(s,v){return s+Math.pow(v-mean,2);},0)/vals.length);
}

/* ── Guide Overlay ── */
function drawGuideOverlay(){
  var ov=dom.guideOverlay;
  if(!ov) return;
  var W=ov.offsetWidth||dom.upzone.offsetWidth, H=ov.offsetHeight||dom.upzone.offsetHeight;
  ov.width=W; ov.height=H;
  var gx=ov.getContext('2d');
  var cx=W/2, cy=H*ROI_CY;
  gx.clearRect(0,0,W,H);
  var r=Math.min(W,H)*FIXED_ROI;
  /* vignette */
  gx.save(); gx.beginPath(); gx.rect(0,0,W,H); gx.arc(cx,cy,r,0,Math.PI*2,true);
  gx.fillStyle='rgba(0,0,0,0.50)'; gx.fill('evenodd'); gx.restore();
  /* progress ring */
  var cov=lastCovPct, covFrac=clamp(cov/50,0,1);
  if(covFrac>0.01){
    var fc=cov>COV_MAX?'rgba(255,60,60,0.95)':cov>=COV_MIN?'rgba(60,210,100,0.92)':'rgba(255,170,40,0.92)';
    gx.beginPath(); gx.arc(cx,cy,r+7,-Math.PI/2,-Math.PI/2+covFrac*Math.PI*2);
    gx.strokeStyle=fc; gx.lineWidth=5; gx.lineCap='round'; gx.stroke(); gx.lineCap='butt';
  }
  /* main ring */
  var ringColor=cov>COV_MAX?'rgba(255,60,60,0.95)':cov>=55?'rgba(60,200,100,0.95)':cov>=COV_MIN?'rgba(200,160,64,0.95)':'rgba(224,80,80,0.90)';
  gx.beginPath(); gx.arc(cx,cy,r,0,Math.PI*2); gx.strokeStyle=ringColor; gx.lineWidth=3; gx.stroke();
  /* corner markers */
  [0,Math.PI/2,Math.PI,Math.PI*1.5].forEach(function(a){
    var px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r, tx=-Math.sin(a), ty=Math.cos(a);
    gx.beginPath(); gx.moveTo(px-tx*18,py-ty*18); gx.lineTo(px+tx*18,py+ty*18);
    gx.strokeStyle='rgba(255,255,255,0.85)'; gx.lineWidth=2.5; gx.stroke();
  });
  gx.beginPath(); gx.arc(cx,cy,3,0,Math.PI*2); gx.fillStyle='rgba(255,255,255,0.7)'; gx.fill();
  /* status text */
  if(liveRunning){
    var msg,mc;
    if(cov>COV_MAX){msg='너무 가까움 — 거리를 멀리하세요';mc='#ff4444';}
    else if(cov>=COV_MIN){var rem=Math.max(0,FRAME_BUF_SIZE-frameBuffer.length); msg=rem>0?'안정화 중 ('+rem+'프레임 남음)':'잠금 준비 완료'; mc='#5dda88';}
    else if(cov>=15){msg='더 가까이 대주세요 ('+cov+'%)';mc='#f0c040';}
    else{msg=currentMode==='color'?'원두를 원 안에 채워주세요':'A4 위 원두를 화면에 채워주세요';mc='#ff6060';}
    gx.save(); gx.font='bold 13px -apple-system,Inter,sans-serif'; gx.textAlign='center'; gx.textBaseline='middle';
    var tw=gx.measureText(msg).width, my=cy+r+26;
    gx.fillStyle='rgba(0,0,0,0.72)';
    gx.beginPath(); if(gx.roundRect) gx.roundRect(cx-tw/2-10,my-14,tw+20,24,5); else gx.rect(cx-tw/2-10,my-14,tw+20,24);
    gx.fill(); gx.fillStyle=mc; gx.fillText(msg,cx,my-2); gx.restore();
  }
}

  dom.lrCovVal.textContent=cov+'%'+(cov>COV_MAX?' — 너무 가까움':cov>=COV_MIN?' ✓ 측정 가능':cov>=15?' — 더 가까이':' — 원두 대기');

  dom.lrLightVal.textContent=r.lowLight?'광량 부족 — 라이트 ON':'G-보정 ×'+(r.gScale||1).toFixed(2);

  var sc=sp>=75?'rgba(60,200,100,.9)':sp>=45?'rgba(255,200,60,.9)':'#e05050';
  dom.lrStabFill.style.width=sp+'%'; dom.lrStabFill.style.background=sc;
  dom.lrStabVal.textContent=isShake?'흔들림!':(frameBuffer.length<4?'대기':'σ='+bs.toFixed(2));
  var status,statusColor='';
  if(r.lowLight){status='광량 부족 — 라이트를 켜고 더 가까이';statusColor='#e05050';}
  else if(isShake){status='손떨림 — 잠시 정지해주세요';statusColor='#e05050';}
  else if(cov>COV_MAX){status='너무 가까움 — 거리를 멀리하세요';statusColor='#ff4444';}
  else if(cov<COV_MIN){status=cov<15?'원두를 화면에 대주세요':'더 채워주세요 ('+cov+'%)';statusColor='#f0a040';}
  else if(frameBuffer.length<FRAME_BUF_SIZE){status='측정 중 — '+frameBuffer.length+'/'+FRAME_BUF_SIZE+'프레임';}
  else if(bs>=STABLE_SIGMA){status='안정화 중 σ='+bs.toFixed(2)+' — 이 거리 유지';statusColor='#f0c040';}

/* ── Auto Lock ── */
function autoLock(){
  liveRunning=false; cancelAnimationFrame(rafId); rafId=null;
  var validation=validateBeanSubject(frameBuffer);
  if(!validation.ok){
    if(liveTrack){try{liveTrack.applyConstraints({advanced:[{torch:false}]});}catch(e){}}
    dom.shakeWarn.classList.remove('on'); dom.liveBadge.style.display='none'; dom.stopBtns.style.display='none';
    showValBlock(validation.reason); renderStepNav(); return;
  }
  dom.lockFlash.classList.add('on'); setTimeout(function(){dom.lockFlash.classList.remove('on');},400);
  if(liveTrack){try{liveTrack.applyConstraints({advanced:[{torch:false}]});}catch(e){}}
  dom.shakeWarn.classList.remove('on'); dom.liveBadge.style.display='none'; dom.stopBtns.style.display='none';

  /* 중앙값 추출 */
  function medArr(arr){arr.sort(function(a,b){return a-b;}); return arr[Math.floor(arr.length/2)];}
  var n=frameBuffer.length, mid=Math.floor(n/2);
  var lsArr=frameBuffer.map(function(f){return f.Ls;}); lsArr.sort(function(a,b){return a-b;});
  var asArr=frameBuffer.map(function(f){return f.As;}); asArr.sort(function(a,b){return a-b;});
  var bsArr=frameBuffer.map(function(f){return f.Bs;}); bsArr.sort(function(a,b){return a-b;});
  var agArr=frameBuffer.map(function(f){return f.agtron;}); agArr.sort(function(a,b){return a-b;});
  var avgLs=lsArr[mid], avgAs=asArr[mid], avgBs=bsArr[mid], avgAg=agArr[mid];
  var lsMean=lsArr.reduce(function(a,b){return a+b;},0)/n;
  var lsStd=Math.sqrt(lsArr.reduce(function(s,v){return s+Math.pow(v-lsMean,2);},0)/n);

  var LsCal=applyDeviceCal(avgLs);
  var finalAg=avgAg;
  var stabGrade=lsStd<0.8?'high':lsStd<1.5?'med':'low';
  var medCov=medArr(frameBuffer.map(function(f){return f.beanCoverage||0;}));
  var conf=Math.round(clamp(clamp(1-lsStd/2.5,0,1)*0.6+clamp(medCov*1.5,0,1)*0.4,0,1)*100);
  var lastR=frameBuffer[frameBuffer.length-1];

  /* 분쇄도 */
  var gVals=frameBuffer.map(function(f){return f.grindMicron;}).filter(function(v){return v!=null;});
  var gMicron=null,gSpread=null;
  if(gVals.length){ gVals.sort(function(a,b){return a-b;}); gMicron=gVals[Math.floor(gVals.length/2)];
    if(gVals.length>=4){ var q1=gVals[Math.floor(gVals.length*0.25)],q3=gVals[Math.floor(gVals.length*0.75)]; gSpread=q3-q1; } }

  if(currentMode==='grind'){
    pendingGrind={grindMicron:gMicron,grindSpread:gSpread,grindFrames:gVals.length,frameCount:n,blobCount:lastR.grindBlobCount||0};
    renderGrindOnly(pendingGrind); renderStepNav();
    dom.lrStatus.textContent='분쇄도 측정 완료'+(gMicron?' — '+gMicron+'µm':'');
    setInst('분쇄도 측정 완료.'); setTimeout(function(){stopLiveAfterLock();},500); return;
  }

  pendingResult={
    agtron:finalAg, agRangeLo:Math.max(15,finalAg-5), agRangeHi:Math.min(95,finalAg+5),
    Ls:LsCal, LsRaw:avgLs, _LsRaw:avgLs, As:avgAs, Bs:avgBs,
    sigma:lsStd, conf:conf, beanType:'ground', isLocked:true, lowLight:false,
    stabSigma:lsStd, lsStd:lsStd, uniformity:lsStd, stabGrade:stabGrade, needsRetake:stabGrade==='low',
    wallL:lastR.wallL, bRGB:lastR.bRGB, wRGB:lastR.bRGB, frameCount:n,
    grindMicron:gMicron, grindSpread:gSpread, dualPass:false, grindLCorr:0, userGrindInput:0,
  };
  dom.lrStatus.textContent='컬러 측정 완료  L*='+LsCal.toFixed(1)+'  Ag '+pendingResult.agRangeLo+'–'+pendingResult.agRangeHi;
  dom.lrStatus.style.color=''; setInst('컬러 측정 완료 — 결과 확인 후 저장하세요.');
  renderResult(pendingResult); renderStepNav();
  setTimeout(function(){stopLiveAfterLock();},500);
}

/* ════════════════════════════════════════
   GRIND SIZE — A4 Blob Detection
════════════════════════════════════════ */
function estimateGrindMicrons(context,W,H){
  try{
    var x0=Math.round(W*0.15),y0=Math.round(H*0.15);
    var x1=Math.round(W*0.85),y1=Math.round(H*0.85);
    var rw=x1-x0,rh=y1-y0;
    if(rw<80||rh<80) return null;
    var imgData=context.getImageData(x0,y0,rw,rh), data=imgData.data, n=rw*rh;
    var lums=new Float32Array(n);
    for(var i=0;i<n;i++){var ri=i*4; lums[i]=0.299*data[ri]+0.587*data[ri+1]+0.114*data[ri+2];}
    var ls=Array.from(lums).sort(function(a,b){return b-a;});
    var bgLum=ls[Math.floor(n*0.25*0.5)]||200;
    if(bgLum<140) return null;
    var threshold=bgLum*0.70;
    var binaryMap=new Uint8Array(n), beanCount=0;
    for(var i=0;i<n;i++){if(lums[i]<threshold&&lums[i]>5){binaryMap[i]=1;beanCount++;}}
    var beanRatio=beanCount/n;
    if(beanRatio<0.005||beanRatio>0.60) return null;
    var estDist=clamp(6+(240-bgLum)*0.05,5,12);
    var pxPerMm=clamp(8.5-(estDist-6)*0.43,4.5,9.5);
    var visited=new Uint8Array(n), blobAreas=[];
    var maxBlobPx=Math.round(Math.PI*Math.pow(pxPerMm*3.0,2));
    var minBlobPx=Math.max(2,Math.round(Math.PI*Math.pow(pxPerMm*0.05,2)));
    for(var startIdx=0;startIdx<n;startIdx++){
      if(!binaryMap[startIdx]||visited[startIdx]) continue;
      var stack=[startIdx],area=0; visited[startIdx]=1;
      while(stack.length>0){
        var idx=stack.pop(); area++;
        if(area>maxBlobPx*1.5) break;
        var py=Math.floor(idx/rw),px=idx%rw;
        var nb=[];
        if(px>0) nb.push(idx-1); if(px<rw-1) nb.push(idx+1);
        if(py>0) nb.push(idx-rw); if(py<rh-1) nb.push(idx+rw);
        for(var ni=0;ni<nb.length;ni++){var nIdx=nb[ni]; if(binaryMap[nIdx]&&!visited[nIdx]){visited[nIdx]=1;stack.push(nIdx);}}
      }
      if(area>=minBlobPx&&area<=maxBlobPx) blobAreas.push(area);
    }
    if(blobAreas.length<8) return null;
    var diameters=blobAreas.map(function(a){return Math.round(2*Math.sqrt(a/Math.PI)/pxPerMm*1000/10)*10;});
    diameters.sort(function(a,b){return a-b;});
    var nd=diameters.length;
    var d50=clamp(diameters[Math.floor(nd*0.50)],80,2500);
    return{microns:d50, spread:diameters[Math.floor(nd*0.90)]-diameters[Math.floor(nd*0.10)], blobCount:nd};
  }catch(e){return null;}
}

function grindInfo(µm){
  if(µm<350)  return{cat:'Espresso',  badge:'esp',   note:'에스프레소  '+µm+'µm'};
  if(µm<600)  return{cat:'Fine Filter',badge:'fine',  note:'파인 필터  '+µm+'µm'};
  if(µm<800)  return{cat:'Brewing',   badge:'brew',  note:'브루잉 적합  '+µm+'µm'};
  if(µm<=870) return{cat:'Cupping',   badge:'cup',   note:'커핑 적합  '+µm+'µm'};
  if(µm<1300) return{cat:'Coarse',    badge:'coarse',note:'코스  '+µm+'µm'};
  return             {cat:'Cold Brew', badge:'cold',  note:'콜드브루  '+µm+'µm'};
}

/* ══ VALIDATION ══ */
function validateBeanSubject(frames){
  if(!frames||frames.length===0) return{ok:false,reason:'분석 데이터가 없습니다. 다시 촬영해주세요.'};
  var lightFails=frames.filter(function(r){return r.lowLight;}).length;
  if(lightFails>frames.length*0.5) return{ok:false,reason:'광량이 부족합니다. 라이트를 켜고 더 가까이 대주세요.'};
  var covs=frames.map(function(r){return r.beanCoverage||0;}).sort(function(a,b){return a-b;});
  var medCov=covs[Math.floor(covs.length/2)];
  var minCov=currentMode==='grind'?0.09:0.13;
  if(medCov<minCov){
    if(medCov<0.05) return{ok:false,reason:'원두가 감지되지 않습니다. 원두를 직접 촬영해주세요.'};
    return{ok:false,reason:'원두 감지율 낮음 ('+Math.round(medCov*100)+'%) — 더 가까이 촬영해주세요.'};
  }
  return{ok:true};
}

    gs.classList.remove('on');
    var ct=G('confTxt'); if(ct) ct.textContent='A4 위 원두를 얇게 뿌리고 7~9cm 수직 촬영';
    setInst('측정 실패 — A4(흰 종이) 위 원두 얇게 뿌리고 재촬영');
  }
  G('rhTag').textContent='분쇄도 측정';
  dom.rp.classList.add('grind-mode'); dom.decision.classList.add('on');
  var dq=dom.decision.querySelector('.decision-q'); if(dq) dq.textContent='이 분쇄도 결과를 저장하시겠습니까?';
  hideValBlock(); dom.rp.classList.add('on'); dom.rp.scrollIntoView({behavior:'smooth',block:'nearest'}); renderStepNav();
}

/* ══ EXAM PANEL ══ */
function updateExamPanel(){
  var hasAny=store.gcol||store.grind;
  if(!hasAny){if(dom.exam) dom.exam.style.display='none'; return;}
  if(dom.exam) dom.exam.style.display='block';
  G('examSub').textContent=(store.gcol&&store.grind)?'컬러+분쇄도 완료':store.gcol?'컬러 완료':'분쇄도 완료';
  var gc2=G('examGcol');
  if(gc2){ if(store.gcol){gc2.classList.remove('missing');G('examGcolLsVal').textContent=store.gcol.Ls.toFixed(1);G('examGcolAg').textContent='Ag '+store.gcol.agtron;G('examGcolRoast').textContent=roastName(store.gcol.Ls);var sw=G('examGcolSw');if(sw&&store.gcol.bRGB)sw.style.background=rgbStr(store.gcol.bRGB);}else{gc2.classList.add('missing');G('examGcolLsVal').textContent='—';G('examGcolAg').textContent='미측정';G('examGcolRoast').textContent='';}}
  var gg=G('examGrind');
  if(gg){ if(store.grind&&store.grind.grindMicron){gg.classList.remove('missing');var gi=grindInfo(store.grind.grindMicron);G('examGrindMicron').textContent=store.grind.grindMicron+' µm';G('examGrindCat').textContent=gi.cat;G('examGrindNote').textContent=gi.note;var ndPct=clamp(((store.grind.grindMicron-100)/(2500-100))*95+2.5,2.5,97.5);var nd=G('examGrindNd');if(nd)nd.style.left=ndPct+'%';}else{gg.classList.add('missing');G('examGrindMicron').textContent='—';G('examGrindCat').textContent='미측정';G('examGrindNote').textContent='';}}
  dom.exam.scrollIntoView({behavior:'smooth',block:'nearest'});
}

/* ══ STEP NAVIGATOR ══ */
var TILE_IDS={color:'tileColor',grind:'tileGrind'};
var TILE_VAL_IDS={color:'tileColorVal',grind:'tileGrindVal'};
var TILE_CHIP_IDS={color:'tileColorChip',grind:'tileGrindChip'};

function renderStepNav(){
  var statusEl=G('stepNavStatus');
  ['color','grind'].forEach(function(k){
    var tile=G(TILE_IDS[k]),valEl=G(TILE_VAL_IDS[k]),chipEl=G(TILE_CHIP_IDS[k]);
    if(!tile||!valEl) return;
    var hasPending=(currentMode===k&&(pendingResult!==null||pendingGrind!==null));
    var cls='step-tile ';
    if(currentMode===k&&liveRunning) cls+='active-mode';
    else if(hasPending) cls+='pending-confirm';
    else if(stepDone[k]) cls+='done';
    else cls+='idle';
    tile.className=cls;
    if(currentMode===k&&liveRunning) valEl.textContent='분석 중…';
    else if(k==='color'){var src=stepDone[k]?store.gcol:(currentMode===k?pendingResult:null); valEl.textContent=src?'L* '+src.Ls.toFixed(1)+'  Ag '+src.agtron:'—';}
    else if(k==='grind'){var gs=stepDone[k]?store.grind:(currentMode===k?pendingGrind:null); valEl.textContent=(gs&&gs.grindMicron)?gs.grindMicron+' µm':'—';}
    if(chipEl) chipEl.textContent=currentMode===k&&liveRunning?'● 측정 중 — 탭하면 중단':hasPending?'▲ 결과 확인':stepDone[k]?'완료 — 재측정 가능':'탭하여 측정';
  });
  if(!statusEl) return;
  var dc=(stepDone.color?1:0)+(stepDone.grind?1:0);
  if(liveRunning) statusEl.textContent=(currentMode==='color'?'그라운드 컬러':'분쇄도 입자')+' — 분석 중';
  else if(pendingResult!==null) statusEl.textContent='그라운드 컬러 — 결과 확인 후 저장 또는 재측정';
  else if(pendingGrind!==null) statusEl.textContent='분쇄도 입자 — 결과 확인 후 저장 또는 재측정';
  else if(dc===2) statusEl.textContent='두 항목 완료  |  정밀검사 확인';
  else if(dc===1) statusEl.textContent='1항목 완료  |  나머지 탭하여 측정';
  else statusEl.textContent='탭하여 측정 시작';
}

function tileAction(mode){
  if(liveRunning&&currentMode===mode){stopLive();return;}
  if(liveRunning&&currentMode!==mode) stopLive();
  if((mode==='color'&&pendingResult!==null&&currentMode===mode)||(mode==='grind'&&pendingGrind!==null&&currentMode===mode)){dom.rp.scrollIntoView({behavior:'smooth',block:'nearest'});return;}
  launchMode(mode);
}
function launchMode(mode){ if(liveRunning) stopLive(); currentMode=mode; hideValBlock(); renderStepNav(); startLive(mode); }
function toggleGuideTab(){ var b=G('guideBody'); b.classList.toggle('open'); if(b.classList.contains('open')) b.scrollIntoView({behavior:'smooth',block:'nearest'}); }

/* ══ CONFIRM / RETAKE / RESET ══ */
function doConfirm(){
  dom.decision.classList.remove('on');
  var dq=dom.decision.querySelector('.decision-q'); if(dq) dq.textContent='이 결과를 사용하시겠습니까?';
  if(currentMode==='grind'&&pendingGrind!==null){store.grind=pendingGrind;stepDone.grind=true;pendingGrind=null;setInst('분쇄도 저장 완료.');}
  else if(pendingResult!==null){store.gcol=pendingResult;stepDone.color=true;pendingResult=null;setInst('그라운드 컬러 저장 완료.');}
  currentMode=null; updateExamPanel(); renderStepNav(); window.scrollTo({top:0,behavior:'smooth'});
}
function doRetake(){
  stopLive(); pendingResult=null; pendingGrind=null; dom.lrStatus.style.color='';
  dom.decision.classList.remove('on'); dom.rp.classList.remove('on');
  dom.badge.style.display='none'; dom.stabBadge.style.display='none'; dom.lowlightWarn.style.display='none';
  hideValBlock(); startLive(); renderStepNav();
}
function doReset(){
  pendingResult=null; pendingGrind=null; store={gcol:null,grind:null}; stepDone={color:false,grind:false}; currentMode=null;
  stopLive(); dom.lrStatus.style.color='';
  dom.prev.style.display='none'; dom.prev.src=''; dom.upph.style.display='flex';
  dom.upzone.classList.remove('loaded'); dom.badge.style.display='none';
  dom.stabBadge.style.display='none'; dom.lowlightWarn.style.display='none';
  dom.rp.classList.remove('on'); dom.decision.classList.remove('on');
  if(dom.exam) dom.exam.style.display='none';
  var bmi=G('beanModeIndicator'); if(bmi) bmi.classList.remove('on');
  hideValBlock(); renderStepNav(); setInst('측정을 시작하세요.'); window.scrollTo({top:0,behavior:'smooth'});
}

/* ══ HELPERS ══ */
function setInst(t){ dom.it.textContent=t; }
function confStateLabel(conf){
  if(conf>=75) return{cls:'high',text:'신뢰도 높음'};
  if(conf>=50) return{cls:'med', text:'신뢰도 보통'};
  if(conf>=25) return{cls:'low', text:'신뢰도 낮음'};
  return           {cls:'blocked',text:'측정 불가'};
}
</script>
